services:
  laravel:
    build: .
    container_name: dualab_laravel
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      - mysql

  node:
    image: node:20
    container_name: dualab_node
    working_dir: /app
    user: node
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

  mysql:
    image: mysql:8
    container_name: dualab_mysql
    restart: always
    environment:
      MYSQL_DATABASE: dualab
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  adminer:
    image: adminer
    container_name: dualab_adminer
    restart: always
    ports:
      - "8082:8080"

volumes:
  mysql_data: